<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AgriScan AI - Offline</title>
  <meta name="theme-color" content="#173124" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, #173124 0%, #0d1f16 50%, #1a3829 100%);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    .container {
      text-align: center;
      max-width: 400px;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .icon-container {
      width: 120px;
      height: 120px;
      margin: 0 auto 32px;
      background: rgba(176, 205, 187, 0.1);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(176, 205, 187, 0.15);
      backdrop-filter: blur(10px);
    }

    .offline-icon {
      font-size: 56px;
      opacity: 0.9;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #b0cdbb;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.65);
      margin-bottom: 32px;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #2d4739, #3a5c4a);
      color: #b0cdbb;
      border: 1px solid rgba(176, 205, 187, 0.2);
      border-radius: 14px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      text-decoration: none;
    }

    .retry-btn:hover {
      background: linear-gradient(135deg, #3a5c4a, #4a7a5f);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .retry-btn:active {
      transform: translateY(0);
    }

    .pulse-ring {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      border: 1px solid rgba(176, 205, 187, 0.05);
      transform: translate(-50%, -50%);
      animation: pulse 4s ease-in-out infinite;
    }

    .pulse-ring:nth-child(2) {
      width: 450px;
      height: 450px;
      animation-delay: 1s;
    }

    .pulse-ring:nth-child(3) {
      width: 600px;
      height: 600px;
      animation-delay: 2s;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.05); }
    }

    .brand {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(176, 205, 187, 0.3);
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="pulse-ring"></div>
  <div class="pulse-ring"></div>
  <div class="pulse-ring"></div>

  <div class="container">
    <div class="icon-container">
      <div class="offline-icon">🌿</div>
    </div>
    <h1>You're Offline</h1>
    <p>
      It looks like you've lost your internet connection.
      AgriScan AI needs a connection for crop diagnostics and portfolio sync.
      Check your connection and try again.
    </p>
    <button class="retry-btn" onclick="window.location.reload()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
      Try Again
    </button>
  </div>

  <div class="brand">AgriScan AI</div>
</body>
</html>
