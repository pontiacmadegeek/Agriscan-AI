<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e8f0eb;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b0cdbb;stop-opacity:0.2"/>
      <stop offset="50%" style="stop-color:#b0cdbb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b0cdbb;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rectangle -->
  <rect x="4" y="4" width="184" height="184" rx="38" ry="38" fill="#173124"/>
  <!-- Subtle inner glow -->
  <rect x="4" y="4" width="184" height="184" rx="38" ry="38" fill="none" stroke="#b0cdbb" stroke-width="1" opacity="0.15"/>
  <!-- Leaf shape - stylized, modern -->
  <path d="M96 38 C130 38, 154 58, 154 92 C154 126, 130 154, 96 154 C80 154, 62 140, 56 120 C52 108, 56 90, 68 76 C78 64, 88 52, 96 38Z" fill="url(#leafGrad)" opacity="0.95"/>
  <!-- Leaf vein (center) -->
  <path d="M96 50 C96 50, 92 80, 88 100 C85 114, 82 130, 82 142" fill="none" stroke="#173124" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <!-- Leaf side veins -->
  <path d="M90 72 L72 82" fill="none" stroke="#173124" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <path d="M88 90 L68 96" fill="none" stroke="#173124" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <path d="M86 108 L70 116" fill="none" stroke="#173124" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <path d="M94 68 L112 62" fill="none" stroke="#173124" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <path d="M92 86 L116 82" fill="none" stroke="#173124" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <path d="M90 104 L114 102" fill="none" stroke="#173124" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <!-- Scan line horizontal -->
  <line x1="46" y1="96" x2="146" y2="96" stroke="url(#scanGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Scan brackets left -->
  <path d="M50 78 L50 70 L58 70" fill="none" stroke="#b0cdbb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M50 114 L50 122 L58 122" fill="none" stroke="#b0cdbb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Scan brackets right -->
  <path d="M142 78 L142 70 L134 70" fill="none" stroke="#b0cdbb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M142 114 L142 122 L134 122" fill="none" stroke="#b0cdbb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small scan dots -->
  <circle cx="60" cy="96" r="1.5" fill="#b0cdbb" opacity="0.7"/>
  <circle cx="132" cy="96" r="1.5" fill="#b0cdbb" opacity="0.7"/>
</svg>
