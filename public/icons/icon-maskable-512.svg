<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e8f0eb;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b0cdbb;stop-opacity:0.2"/>
      <stop offset="50%" style="stop-color:#b0cdbb;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#b0cdbb;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background for maskable icon -->
  <rect x="0" y="0" width="512" height="512" fill="#173124"/>
  <!-- All content within safe zone: inner 80% = ~410px centered, padding ~51px each side -->
  <!-- Leaf shape - scaled to fit within safe zone -->
  <path d="M256 120 C326 120, 374 164, 374 234 C374 304, 326 362, 256 362 C221 362, 187 336, 174 298 C166 274, 174 240, 195 214 C214 190, 237 156, 256 120Z" fill="url(#leafGrad)" opacity="0.95"/>
  <!-- Leaf vein (center) -->
  <path d="M256 148 C256 148, 248 208, 240 250 C234 278, 228 314, 228 336" fill="none" stroke="#173124" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <!-- Leaf side veins -->
  <path d="M246 192 L206 214" fill="none" stroke="#173124" stroke-width="4" stroke-linecap="round" opacity="0.2"/>
  <path d="M242 230 L202 242" fill="none" stroke="#173124" stroke-width="4" stroke-linecap="round" opacity="0.2"/>
  <path d="M238 268 L202 282" fill="none" stroke="#173124" stroke-width="4" stroke-linecap="round" opacity="0.2"/>
  <path d="M252 180 L288 170" fill="none" stroke="#173124" stroke-width="4" stroke-linecap="round" opacity="0.2"/>
  <path d="M248 218 L294 210" fill="none" stroke="#173124" stroke-width="4" stroke-linecap="round" opacity="0.2"/>
  <path d="M244 256 L290 250" fill="none" stroke="#173124" stroke-width="4" stroke-linecap="round" opacity="0.2"/>
  <!-- Scan line horizontal -->
  <line x1="142" y1="245" x2="370" y2="245" stroke="url(#scanGrad)" stroke-width="5" stroke-linecap="round"/>
  <!-- Scan brackets left -->
  <path d="M154 208 L154 192 L170 192" fill="none" stroke="#b0cdbb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M154 282 L154 298 L170 298" fill="none" stroke="#b0cdbb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Scan brackets right -->
  <path d="M358 208 L358 192 L342 192" fill="none" stroke="#b0cdbb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M358 282 L358 298 L342 298" fill="none" stroke="#b0cdbb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small scan dots -->
  <circle cx="176" cy="245" r="3.5" fill="#b0cdbb" opacity="0.7"/>
  <circle cx="336" cy="245" r="3.5" fill="#b0cdbb" opacity="0.7"/>
</svg>
